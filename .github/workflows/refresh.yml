name: Scheduled Corpus Refresh

# Phase 10 — the CI runner IS the scheduler, so no always-on worker is needed.
# GitHub cron is UTC-only, so the desired 10:30 AM IST cadence is encoded as its
# UTC equivalent (05:00 UTC). workflow_dispatch allows manual / one-off runs.
on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC = 10:30 AM IST, daily
  workflow_dispatch:
    inputs:
      force_reindex:
        description: "Rebuild the index even if the corpus is unchanged"
        type: boolean
        default: false

# CI-level single-flight: never run two refreshes at once. Queue rather than
# cancel so an in-progress rebuild is allowed to finish and publish.
concurrency:
  group: corpus-refresh
  cancel-in-progress: false

# The refresh commits the rebuilt index back to the deployed branch, which is
# what triggers a Streamlit Community Cloud redeploy — so it needs write access.
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Injected from repo secrets; never committed. Optional for the refresh
      # itself (scrape/parse/chunk/index need no LLM), but present so the run
      # environment matches production.
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run corpus refresh
        run: >-
          python -m scheduler.refresh
          ${{ (github.event_name == 'workflow_dispatch' && inputs.force_reindex) && '--force' || '' }}

      # Publish for Streamlit: commit the rebuilt index (+ corpus registry +
      # freshness file) back to the deployed branch. Streamlit Community Cloud
      # watches the repo and auto-reboots on new commits, so the running app
      # picks up the fresh index. Only commits when the corpus actually changed
      # (status == "ok"); a no-change run publishes nothing (honours idempotency).
      # This workflow only triggers on schedule/dispatch (never on push), so the
      # commit cannot re-trigger it — no loop.
      - name: Publish refreshed index to repo (triggers Streamlit redeploy)
        if: success()
        run: |
          status=$(python -c "import json; print(json.load(open('data/last_refresh.json')).get('status',''))" 2>/dev/null || echo "")
          echo "Refresh status: $status"
          if [ "$status" != "ok" ]; then
            echo "Corpus unchanged (status=$status) — nothing to publish."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vectorstore/index data/metadata.json data/last_refresh.json
          if git diff --cached --quiet; then
            echo "No file changes to commit."
            exit 0
          fi
          git commit -m "chore(refresh): update corpus index [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"

      # Also keep the rebuilt index downloadable as an artifact for inspection.
      - name: Upload index artifact (inspection)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-index
          path: |
            vectorstore/index/
            data/last_refresh.json
          retention-days: 14
          if-no-files-found: ignore

      # On failure, surface the status file so the run's cause is visible. The
      # job's non-zero exit marks the run failed and fires GitHub's standard
      # failure notification to the workflow's watchers.
      - name: Publish refresh status (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-status-failed
          path: data/last_refresh.json
          if-no-files-found: ignore
